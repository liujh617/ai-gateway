name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22.x"
          cache: true

      - name: Verify
        run: make verify

      - name: Check config examples
        run: make check-config-examples

      - name: Build binary
        run: make build

      - name: Release check
        run: make release-check

  docker:
    runs-on: ubuntu-24.04
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: make docker-build
